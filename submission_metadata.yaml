# ============================================================================
# Approach summary 
# ============================================================================
methodology_summary: |
  " My ranking system uses a two-stage candidate selection pipeline.
  First, a fast filtering stage scores all candidates using career
  relevance, retrieval-related skills, experience, and behavioral
  signals. The top 2000 candidates are selected from the large pool.
  In the second stage, semantic ranking is performed using the
  sentence-transformers/all-MiniLM-L6-v2 embedding model. Candidate
  profiles and job descriptions are embedded and compared using cosine
  similarity. Additional factors such as retrieval expertise, career
  relevance, experience range, recruiter engagement signals, role
  bonuses, and role penalties are combined into a final ranking score.
  The system produces the top 100 ranked candidates along with
  human-readable reasoning for each recommendation."
